<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login - NutriSabor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card-login { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-size: 2rem; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="card card-login bg-white">
        <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo NutriSabor" style="max-height: 100px;">
        </div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger text-center">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="admin@nutrisabor.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Entrar no Sistema</button>
            </div>
        </form>
        <div class="text-center mt-3 d-flex justify-content-center gap-3">
            <a href="{{ url_for('auth.primeiro_acesso') }}" class="text-decoration-none text-success small fw-semibold">
                🆕 Primeiro Acesso
            </a>
            <span class="text-muted small">|</span>
            <a href="{{ url_for('auth.esqueci_senha') }}" class="text-decoration-none text-secondary small">
                🔑 Esqueci minha senha
            </a>
        </div>
    </div>
</body>
</html>
